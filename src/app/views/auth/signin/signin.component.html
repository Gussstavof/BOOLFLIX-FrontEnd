<section class="auth-shell">
  <div class="auth-card bf-panel">
    <h1>Entrar no BOOLFLIX</h1>
    <p>Acesse sua conta para assistir e gerenciar conteúdo.</p>

    <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" formControlName="email" placeholder="voce@email.com" />
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Senha</label>
        <input type="password" class="form-control" id="password" formControlName="password" placeholder="********" />
      </div>

      <button type="submit" class="btn bf-btn-primary w-100 py-2" [disabled]="!signInForm.valid">Entrar</button>
    </form>
  </div>
</section>
