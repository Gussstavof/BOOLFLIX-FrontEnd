<section class="auth-shell">
  <div class="auth-card bf-panel">
    <h1>Criar conta</h1>
    <p>Preencha os dados para se cadastrar no BOOLFLIX.</p>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="username" class="form-label">Nome</label>
        <input type="text" class="form-control" id="username" formControlName="username" placeholder="Seu nome" />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" formControlName="email" placeholder="voce@email.com" />
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Senha</label>
        <input type="password" class="form-control" id="password" formControlName="password" placeholder="********" />
      </div>

      <button type="submit" class="btn bf-btn-primary w-100 py-2" [disabled]="!signupForm.valid">Cadastrar</button>
    </form>
  </div>
</section>
