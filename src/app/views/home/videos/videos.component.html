<app-filter
  (categorySelected)="onChangeCategory($event)"
  (searchChanged)="onSearchChanged($event)">
</app-filter>

<div class="row g-3" *ngIf="videos.length; else emptyState">
  <div class="col-md-6 col-lg-4" *ngFor="let video of videos">
    <mat-card class="h-100">
      <mat-card-header>
        <mat-card-title>{{ video.title }}</mat-card-title>
        <mat-card-subtitle [style.color]="video.category.color">{{ video.category.title }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <iframe width="100%" height="220" [src]="video.urlSafe" frameborder="0"
                allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
        <p class="mt-2 mb-0">{{ video.description }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>

<ng-template #emptyState>
  <p class="text-muted">Nenhum vídeo encontrado com os filtros selecionados.</p>
</ng-template>
