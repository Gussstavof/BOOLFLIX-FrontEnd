<section class="page-shell pt-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="section-title mb-0">Catálogo de vídeos</h2>
  </div>

  <app-filter (categorySelected)="onChangeCategory($event)"></app-filter>

  <div class="videos-grid mt-4">
    <article class="video-card bf-panel" *ngFor="let video of videos">
      <div class="ratio ratio-16x9 rounded overflow-hidden mb-3">
        <iframe
          [src]="video.urlSafe"
          frameborder="0"
          allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>

      <h3>{{ video.title }}</h3>
      <p>{{ video.description }}</p>
    </article>
  </div>
</section>
