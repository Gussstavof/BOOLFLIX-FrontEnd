<div class="filter-wrap bf-panel p-3">
  <mat-form-field appearance="outline" class="w-100 m-0">
    <mat-label>Filtrar por categoria</mat-label>
    <mat-select [(ngModel)]="category" (ngModelChange)="sendCategory($event)">
      <mat-option *ngFor="let category of categories" [value]="category">
        {{ category.title }}
      </mat-option>
    </mat-select>
  </mat-form-field>
</div>
